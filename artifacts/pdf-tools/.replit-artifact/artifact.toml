kind = "web"
previewPath = "/"
title = "PDF Tools"
version = "1.0.0"
id = "artifacts/pdf-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21070

[services.development]
run = "pnpm --filter @workspace/pdf-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-tools", "run", "build" ]
publicDir = "artifacts/pdf-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21070"
BASE_PATH = "/"
